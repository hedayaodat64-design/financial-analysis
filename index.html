<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحليل المالي الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        :root { --royal-purple: #3f3d99; --vibrant-green: #00d27a; --soft-bg: #f8faff; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; margin: 0; }
        .app-container { width: 100%; max-width: 450px; min-height: 100vh; background-color: var(--soft-bg); margin: auto; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.05); }
        .custom-input { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1.5px solid #e2e8f0; background: #fdfdfd; font-weight: 600; margin-top: 6px; }
        .btn-primary { background: linear-gradient(135deg, var(--royal-purple), #5a58c7); color: white; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; box-shadow: 0 4px 15px rgba(63, 61, 153, 0.3); }
        .label-text { font-size: 12px; color: #64748b; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-page" class="page active flex flex-col h-screen overflow-hidden">
        <div class="flex-1 bg-[#3f3d99] flex flex-col items-center justify-center p-8 text-white text-center">
            <div class="w-20 h-20 bg-white/10 rounded-3xl flex items-center justify-center mb-6 backdrop-blur-md">
                <i class="fas fa-fingerprint text-4xl text-vibrant-green"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">نظام التحليل المالي</h1>
            <p class="text-blue-100 text-sm opacity-70">الرجاء إدخال رمز الوصول للمتابعة</p>
        </div>
        <div class="flex-[1.2] bg-white p-10 -mt-12 rounded-t-[50px] flex flex-col items-center shadow-2xl">
            <input type="password" id="pinInput" class="w-full text-center text-4xl tracking-[0.4em] border-b-2 border-gray-100 focus:border-royal-purple outline-none pb-4 mb-12" placeholder="••••">
            <button onclick="checkPin()" class="btn-primary">دخول</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="p-5 bg-white flex justify-between items-center sticky top-0 z-50 border-b border-gray-50 shadow-sm">
            <button onclick="location.reload()" class="text-royal-purple"><i class="fas fa-arrow-right"></i></button>
            <h2 class="text-[15px] font-bold text-royal-purple">لوحة التحكم المالية</h2>
            <i class="fas fa-gem text-vibrant-green"></i>
        </header>

        <div id="entry-page" class="page active p-6">
            <div class="card border-r-4 border-royal-purple">
                <h3 class="font-bold text-sm text-royal-purple mb-4"><i class="fas fa-file-invoice ml-2"></i>بيانات الدخل والمركز المالي</h3>
                <div class="space-y-4">
                    <div><label class="label-text">صافي المبيعات</label><input type="number" id="sales" class="custom-input" placeholder="0"></div>
                    <div><label class="label-text">تكلفة البضاعة والمصاريف</label><input type="number" id="expenses" class="custom-input" placeholder="0"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="label-text">الأصول المتداولة</label><input type="number" id="curAssets" class="custom-input" placeholder="0"></div>
                        <div><label class="label-text">الالتزامات المتداولة</label><input type="number" id="curLiab" class="custom-input" placeholder="0"></div>
                    </div>
                </div>
            </div>

            <div class="card border-r-4 border-vibrant-green">
                <h3 class="font-bold text-sm text-green-700 mb-4"><i class="fas fa-money-bill-transfer ml-2"></i>التدفقات النقدية</h3>
                <div class="space-y-4">
                    <div><label class="label-text">تدفق تشغيلي</label><input type="number" id="cf_op" class="custom-input" placeholder="0"></div>
                    <div><label class="label-text">تدفق استثماري / تمويلي</label><input type="number" id="cf_inv_fin" class="custom-input" placeholder="0"></div>
                </div>
            </div>

            <button onclick="processData()" class="btn-primary mt-4">إصدار التقارير</button>
        </div>

        <div id="results-page" class="page p-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="card flex flex-col items-center justify-center p-4">
                    <i class="fas fa-droplet text-blue-500 mb-2"></i>
                    <p class="text-[10px] font-bold text-gray-400">نسبة السيولة</p>
                    <p id="res_liq" class="text-lg font-bold">0.0</p>
                </div>
                <div class="card flex flex-col items-center justify-center p-4">
                    <i class="fas fa-arrow-up-right-dots text-vibrant-green mb-2"></i>
                    <p class="text-[10px] font-bold text-gray-400">هامش الربح</p>
                    <p id="res_margin" class="text-lg font-bold">0%</p>
                </div>
            </div>

            <div class="card bg-royal-purple text-white">
                <div class="flex justify-between items-center border-b border-white/10 pb-3 mb-3">
                    <span class="text-xs opacity-80">صافي التدفق النقدي</span>
                    <span id="res_cash" class="font-bold">0 JOD</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs opacity-80">صافي الربح</span>
                    <span id="res_net" class="font-bold">0 JOD</span>
                </div>
            </div>

            <div id="advice-box" class="card border-r-4 border-amber-400 bg-amber-50">
                <h4 class="text-xs font-bold text-amber-800 mb-2"><i class="fas fa-lightbulb ml-1"></i> نصيحة النظام التحليلي:</h4>
                <p id="advice_text" class="text-[11px] text-amber-900 leading-relaxed italic"></p>
            </div>

            <button onclick="showPage('entry-page')" class="btn-primary bg-gray-600 mt-4 shadow-none">تعديل البيانات</button>
        </div>
    </div>
</div>

<script>
    function checkPin() {
        if(document.getElementById('pinInput').value === "2003") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
        } else {
            alert("الرمز غير صحيح.");
        }
    }

    function processData() {
        // المدخلات
        const s = parseFloat(document.getElementById('sales').value) || 0;
        const e = parseFloat(document.getElementById('expenses').value) || 0;
        const ca = parseFloat(document.getElementById('curAssets').value) || 0;
        const cl = parseFloat(document.getElementById('curLiab').value) || 0;
        const cop = parseFloat(document.getElementById('cf_op').value) || 0;
        const cinv = parseFloat(document.getElementById('cf_inv_fin').value) || 0;

        // الحسابات
        const netProfit = s - e;
        const liquidity = cl > 0 ? (ca / cl).toFixed(2) : 0;
        const margin = s > 0 ? ((netProfit / s) * 100).toFixed(1) : 0;
        const netCF = cop + cinv;

        // العرض
        document.getElementById('res_liq').innerText = liquidity;
        document.getElementById('res_margin').innerText = margin + "%";
        document.getElementById('res_net').innerText = netProfit.toLocaleString() + " JOD";
        document.getElementById('res_cash').innerText = netCF.toLocaleString() + " JOD";

        // منطق النصائح الذكي
        let advice = "";
        if (liquidity < 1) advice = "تنبيه: نسبة السيولة منخفضة، يفضل تحويل بعض الأصول لسيولة لمواجهة الالتزامات.";
        else if (margin > 20) advice = "أداء ممتاز: هامش الربح مرتفع، يمكنك التفكير في التوسع أو الاستثمار الإضافي.";
        else advice = "الوضع المالي مستقر حالياً، ينصح بمراقبة المصاريف التشغيلية لزيادة الهامش.";

        document.getElementById('advice_text').innerText = advice;

        showPage('results-page');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if(pageId === 'entry-page') {
            document.getElementById('entry-page').classList.add('active');
            document.getElementById('results-page').classList.add('hidden');
        } else {
            document.getElementById('entry-page').classList.remove('active');
            document.getElementById('results-page').classList.remove('hidden');
            document.getElementById('results-page').classList.add('active');
        }
    }
</script>

</body>
</html>
