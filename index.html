<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحليل المالي الاستراتيجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .text-glow { text-shadow: 0 0 10px rgba(52, 211, 153, 0.5); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // مكون بسيط للأيقونات لأن Lucide-React تحتاج إعداد خاص في الـ CDN
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('welcome');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showSaveMessage, setShowSaveMessage] = useState(false);
            const [financialData, setFinancialData] = useState({
                assets: { current: 0, fixed: 0, receivables: 0 },
                liabilities: { current: 0, longTerm: 0 },
                equity: { capital: 0, retainedEarnings: 0 },
                revenue: 0, cogs: 0, expenses: 0, inventory: 0,
                cashFlow: { operating: 0, investing: 0, financing: 0 }
            });

            // الحسابات المالية
            const totalAssets = (financialData.assets.current || 0) + (financialData.assets.fixed || 0) + (financialData.assets.receivables || 0);
            const totalLiabilities = (financialData.liabilities.current || 0) + (financialData.liabilities.longTerm || 0);
            const totalEquity = (financialData.equity.capital || 0) + (financialData.equity.retainedEarnings || 0);
            const netIncome = (financialData.revenue || 0) - (financialData.cogs || 0) - (financialData.expenses || 0);
            const totalCashFlow = (financialData.cashFlow.operating || 0) + (financialData.cashFlow.investing || 0) + (financialData.cashFlow.financing || 0);

            const calculateRatios = () => {
                const current = financialData.liabilities.current > 0 ? (financialData.assets.current / financialData.liabilities.current) : 0;
                const quick = financialData.liabilities.current > 0 ? ((financialData.assets.current - financialData.inventory) / financialData.liabilities.current) : 0;
                const margin = financialData.revenue > 0 ? (netIncome / financialData.revenue) * 100 : 0;
                const dToE = totalEquity > 0 ? (totalLiabilities / totalEquity) : 0;
                return { current, quick, margin, dToE };
            };

            const ratios = calculateRatios();

            const handleInputChange = (category, field, value) => {
                const numValue = parseFloat(value) || 0;
                if (field) {
                    setFinancialData(prev => ({ ...prev, [category]: { ...prev[category], [field]: numValue } }));
                } else {
                    setFinancialData(prev => ({ ...prev, [category]: numValue }));
                }
            };

            const RatioCard = ({ title, value, unit, description, interpretation, statusColor }) => (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm transition-all hover:shadow-md">
                    <div className="flex justify-between items-start mb-4">
                        <div className={`p-2 rounded-lg bg-${statusColor}-50 text-${statusColor}-600`}>
                            <Icon name="activity" />
                        </div>
                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full bg-${statusColor}-50 text-${statusColor}-600 uppercase`}>تحليل النسبة</span>
                    </div>
                    <h4 className="text-slate-500 text-xs mb-1 font-medium">{title}</h4>
                    <div className="flex items-baseline gap-1 mb-3">
                        <span className="text-2xl font-black text-slate-800">{value}</span>
                        <span className="text-xs text-slate-400 font-bold">{unit}</span>
                    </div>
                    <p className="text-[11px] text-slate-600 leading-relaxed mb-3 pb-3 border-b border-slate-50 italic">{description}</p>
                    <p className="text-[10px] text-indigo-900 font-medium"><b>التفسير: </b>{interpretation}</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900" dir="rtl">
                    <header className="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-40 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-900 p-2 rounded-xl text-white"><Icon name="shield-check" /></div>
                            <div>
                                <h1 className="text-lg font-bold text-indigo-900 leading-tight">نظام التحليل المالي</h1>
                                <p className="text-xs text-slate-500">الإصدار الخاص بالمنشآت</p>
                            </div>
                        </div>
                        <button onClick={() => setActiveTab(activeTab === 'welcome' ? 'input' : 'welcome')} className="p-2 bg-indigo-50 text-indigo-900 rounded-xl">
                            <Icon name="menu" />
                        </button>
                    </header>

                    <main className="pt-24 pb-12 px-4 max-w-7xl mx-auto">
                        {activeTab === 'welcome' && (
                            <div className="bg-gradient-to-br from-slate-900 to-indigo-900 rounded-[2.5rem] p-8 md:p-16 text-white shadow-2xl">
                                <h2 className="text-3xl md:text-5xl font-light mb-6">مرحباً بك في نظام التحليل <br/> <span className="font-bold text-emerald-400 text-glow">المالي الاستراتيجي</span></h2>
                                <p className="text-indigo-100 text-lg mb-10 opacity-90">حول أرقام منشأتك إلى رؤى واضحة بضغطة زر.</p>
                                <button onClick={() => setActiveTab('input')} className="flex items-center gap-3 bg-emerald-500 hover:bg-emerald-400 px-8 py-4 rounded-2xl font-bold transition-all">ابدأ الإدخال <Icon name="chevron-right" /></button>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <section className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="text-lg font-black mb-6 text-indigo-900 flex items-center gap-2"> <Icon name="wallet" /> الميزانية العمومية</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400">الأصول المتداولة</label>
                                            <input type="number" onChange={(e) => handleInputChange('assets', 'current', e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" placeholder="0" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400">الالتزامات المتداولة</label>
                                            <input type="number" onChange={(e) => handleInputChange('liabilities', 'current', e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" placeholder="0" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400">المخزون</label>
                                            <input type="number" onChange={(e) => handleInputChange('inventory', null, e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" placeholder="0" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400">رأس المال</label>
                                            <input type="number" onChange={(e) => handleInputChange('equity', 'capital', e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" placeholder="0" />
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveTab('ratios')} className="mt-8 w-full bg-indigo-900 text-white py-4 rounded-2xl font-bold">عرض النتائج والنسب</button>
                                </section>

                                <div className="space-y-6">
                                    <section className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                                        <h3 className="text-lg font-black mb-6 text-indigo-900 flex items-center gap-2"><Icon name="trending-up" /> قائمة الدخل</h3>
                                        <div className="space-y-4">
                                            <input type="number" placeholder="إجمالي الإيرادات" onChange={(e) => handleInputChange('revenue', null, e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" />
                                            <input type="number" placeholder="المصاريف التشغيلية" onChange={(e) => handleInputChange('expenses', null, e.target.value)} className="w-full bg-slate-50 rounded-xl px-4 py-3 outline-none focus:border-indigo-100 border-2 border-transparent" />
                                        </div>
                                    </section>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ratios' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <RatioCard 
                                    title="نسبة التداول" 
                                    value={ratios.current.toFixed(2)} 
                                    unit="مرة" 
                                    description="قدرة المنشأة على سداد ديونها."
                                    interpretation={ratios.current >= 1.5 ? "وضع آمن" : "سيولة منخفضة"}
                                    statusColor={ratios.current >= 1.5 ? "emerald" : "orange"}
                                />
                                <RatioCard 
                                    title="هامش الربح" 
                                    value={ratios.margin.toFixed(1)} 
                                    unit="%" 
                                    description="نسبة الربح من المبيعات."
                                    interpretation={ratios.margin > 10 ? "ربحية جيدة" : "تحتاج مراجعة"}
                                    statusColor={ratios.margin > 10 ? "indigo" : "slate"}
                                />
                                <button onClick={() => setActiveTab('input')} className="p-6 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 hover:border-indigo-400 hover:text-indigo-400 transition-all font-bold text-sm">تعديل البيانات المالية</button>
                            </div>
                        )}
                    </main>
                    <footer className="text-center py-8 text-slate-400 text-xs">© 2026 جميع الحقوق محفوظة</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
