<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوصلة هدايه - نسخة العرض المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfaf7; color: #1a1a1a; margin: 0; overflow-x: hidden; }
        :root { --royal-blue: #00002A; --gold-primary: #D4AF37; --gold-light: #F1E5AC; --deep-sea: #1A3F75; }
        
        .dark-card { background-color: var(--royal-blue); color: white; border-radius: 40px; border: 1px solid var(--gold-primary); }
        
        #side-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #side-menu.open { transform: translateX(0); }

        .menu-btn {
            width: 50px; height: 50px; background: var(--royal-blue); border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; border: 1px solid var(--gold-primary);
        }
        .menu-btn div { width: 25px; height: 3px; background: var(--gold-primary); border-radius: 2px; }

        .nav-icon-link {
            width: 60px; height: 60px; background: var(--deep-sea); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: var(--gold-light); transition: 0.3s; cursor: pointer;
        }
        .nav-icon-link.active { background: var(--gold-primary); color: var(--royal-blue); box-shadow: 0 0 15px var(--gold-primary); }

        .stat-card { padding: 30px; margin-bottom: 15px; box-shadow: 0 20px 40px rgba(0,0,42,0.3); position: relative; overflow: hidden; }
        .stat-card .value { font-size: 34px; font-weight: 900; color: var(--gold-primary); }
        .stat-card.expense-card .value { color: #ff6b6b; }

        .white-card { background: white; border-radius: 35px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .record-item { border-right: 4px solid var(--gold-primary); }
        .accounting-code { font-size: 7px; opacity: 0.5; color: var(--gold-primary); display: block; margin-top: -2px; }
        
        input:disabled, select:disabled { background-color: #f8fafc !important; cursor: not-allowed; opacity: 0.7; }
        svg.filled { fill: currentColor; stroke: none; }
    </style>
</head>
<body>

    <div id="overlay" class="fixed inset-0 bg-black/60 hidden z-[90]" onclick="toggleMenu()"></div>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-[100px] bg-white shadow-2xl z-[100] flex flex-col items-center pt-24 border-l border-gold-primary">
        <div class="nav-icon-link active" title="لوحة التحكم" onclick="showSection('dashboard', this)">
            <svg class="filled" width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-icon-link" title="القيود اليدوية" onclick="showSection('manual-entry', this)">
            <svg class="filled" width="28" height="28" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </div>
        <div class="nav-icon-link" title="المبيعات" onclick="showSection('sales-entry', this)">
            <svg class="filled" width="28" height="28" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <div class="nav-icon-link" title="التحليل" onclick="showSection('profit-calc', this)">
            <svg class="filled" width="28" height="28" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        </div>
        <div class="nav-icon-link" title="الميزانية" onclick="showSection('sovereign', this)">
            <svg class="filled" width="28" height="28" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        </div>
    </div>

    <div class="max-w-md mx-auto min-h-screen p-6 relative">
        <header class="flex justify-between items-center mb-10">
            <div class="menu-btn" onclick="toggleMenu()"><div></div><div></div><div></div></div>
            <div class="text-right">
                <h1 class="text-2xl font-black text-[#00002A]">بوصلة هدايه</h1>
                <p class="text-[11px] text-[#D4AF37] font-bold uppercase tracking-widest">
                   لوحة عرض  _الوعي المالي والوضوح الرقمي </p>
            </div>
            <div class="w-14 h-14 dark-card flex items-center justify-center text-2xl font-black text-[#D4AF37] border-2 border-[#D4AF37]">H</div>
        </header>

        <div id="section-dashboard" class="space-y-4">
            <div class="dark-card stat-card border-gold-primary">
                <p class="text-slate-400 text-xs font-bold">إجمالي الإيرادات</p>
                <div class="value mt-1">$<span id="display-inflow">0</span></div>
            </div>
            <div class="dark-card stat-card border-gold-primary expense-card" style="background-color: #000035;">
                <p class="text-slate-400 text-xs font-bold">إجمالي النفقات</p>
                <div class="value mt-1">$<span id="display-outflow">0</span></div>
            </div>
            
            <div class="white-card mt-6">
                <h3 class="font-black border-r-4 border-[#D4AF37] pr-3 mb-4 text-[#00002A]">القيود المحاسبية</h3>
                <div id="records-list" class="space-y-3 text-sm mb-6"></div>
                <div style="position: relative; height:300px; width:100%"><canvas id="financeChart"></canvas></div>
            </div>
        </div>

        <div id="section-profit-calc" class="hidden space-y-6">
            <div class="white-card">
                <h2 class="text-xl font-black mb-4 text-[#D4AF37]">تحليل الربحية</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="اسم العميل" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                    <input type="number" placeholder="التكلفة" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                    <input type="number" placeholder="السعر" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                    <p class="text-center text-[10px] text-gray-400 uppercase font-bold">نموذج عرض فقط</p>
                </div>
            </div>
        </div>

        <div id="section-sales-entry" class="hidden space-y-6">
            <div class="white-card">
                <h2 class="text-xl font-black mb-6 text-[#D4AF37]">الحركات التجارية</h2>
                <div class="space-y-4">
                    <select class="w-full p-4 bg-slate-50 rounded-2xl" disabled><option>عرض الحركات</option></select>
                    <input type="text" placeholder="الطرف الآخر" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                </div>
            </div>
        </div>

        <div id="section-manual-entry" class="hidden space-y-6">
            <div class="white-card">
                <h2 class="text-xl font-black mb-6 text-[#D4AF37]">القيود اليدوية</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="وصف القيد" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                    <input type="number" placeholder="المبلغ" class="w-full p-4 bg-slate-50 rounded-2xl" disabled>
                </div>
            </div>
        </div>

        <div id="section-sovereign" class="hidden space-y-6">
            <h2 class="text-2xl font-black mb-4 text-[#00002A]">مركز الميزانية</h2>
            <div class="white-card border-r-8 border-[#00002A] flex justify-between items-center"><span class="font-black">الأصول</span><span id="asset-total" class="font-black text-xl text-[#00002A]">$0</span></div>
            <div class="white-card border-r-8 border-[#1A3F75] flex justify-between items-center"><span class="font-black">الالتزامات</span><span id="liab-total" class="font-black text-xl text-[#1A3F75]">$0</span></div>
            <div class="white-card border-r-8 border-[#D4AF37] flex justify-between items-center"><span class="font-black">حقوق الملكية</span><span id="equity-total" class="font-black text-xl text-[#D4AF37]">$0</span></div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('hedaya_records_v3')) || [];
        let myChart = null;

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function showSection(id, element) {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-icon-link').forEach(link => link.classList.remove('active'));
            if(element) element.classList.add('active');
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            updateUI();
        }

        function initChart(data) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['إيرادات', 'نفقات', 'أصول', 'التزامات', 'حقوق'],
                    datasets: [{
                        data: [data.inflow, data.outflow, data.assets, data.liabs, data.equity],
                        backgroundColor: ['#D4AF37', '#7DA0CA', '#00002A', '#1A3F75', '#F1E5AC']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateUI() {
            let inflow = 0, outflow = 0, assets = 0, liabs = 0, equity = 0;
            const log = document.getElementById('records-list');
            if (log) log.innerHTML = '';

            records.forEach((r) => {
                if(r.type === 'sale') { inflow += r.amount; if(r.cost) outflow += r.cost; } 
                else if(r.type === 'purchase') { outflow += r.amount; } 
                else if(r.type === 'manual') { 
                    if(r.target === 'asset') assets += r.amount; 
                    if(r.target === 'liab') liabs += r.amount; 
                    if(r.target === 'equity') equity += r.amount; 
                }
                
                if (log) {
                    const div = document.createElement('div');
                    div.className = "record-item flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm mb-2";
                    div.innerHTML = `<span class="font-black text-[#00002A]">$${r.amount.toLocaleString()}</span>
                                     <div class="text-right"><p class="font-bold text-[#1A3F75]">${r.name}</p>
                                     <p class="text-[9px] text-amber-600 font-bold">${r.category}</p></div>`;
                    log.appendChild(div);
                }
            });

            document.getElementById('display-inflow').innerText = inflow.toLocaleString();
            document.getElementById('display-outflow').innerText = outflow.toLocaleString();
            document.getElementById('asset-total').innerText = `$${assets.toLocaleString()}`;
            document.getElementById('liab-total').innerText = `$${liabs.toLocaleString()}`;
            document.getElementById('equity-total').innerText = `$${equity.toLocaleString()}`;
            initChart({inflow, outflow, assets, liabs, equity});
        }

        // تشغيل الواجهة فوراً عند التحميل
        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
